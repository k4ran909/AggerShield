# GoReleaser config — builds release artifacts when you push a version tag.
#   git tag v0.1.0 && git push origin v0.1.0
# The release workflow (.github/workflows/release.yml) runs this automatically.
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: aggershield
    main: ./cmd/aggershield
    binary: aggershield
    env: [CGO_ENABLED=0]
    ldflags: ["-s -w -X main.agentVersion={{.Version}}"]
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]

  - id: aggershield-server
    main: ./cmd/aggershield-server
    binary: aggershield-server
    env: [CGO_ENABLED=0]
    ldflags: ["-s -w"]
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]

archives:
  - id: default
    builds: [aggershield, aggershield-server]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE
      - config.json
      - client/**
      - deploy/**
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude: ["^docs:", "^test:", "^chore:"]

release:
  github:
    owner: k4ran909
    name: AggerShield
